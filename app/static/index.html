<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能文档排版对齐助手</title>
  
  <!-- Premium Modern Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    /* ── Core Design System & Tokens ── */
    :root {
      --font: 'Plus Jakarta Sans', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      --r-lg: 16px;
      --r-md: 12px;
      --r-sm: 8px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      
      /* Light Mode Color Palette (Sleek Slate & Indigo) */
      --bg: #f8fafc;
      --bg-card: rgba(255, 255, 255, 0.85);
      --bg-card-hover: #ffffff;
      --bg-header: rgba(255, 255, 255, 0.8);
      --border: rgba(226, 232, 240, 0.8);
      --border-hover: rgba(194, 205, 220, 0.8);
      --border-focus: #4f46e5;
      
      --text: #0f172a;
      --text-muted: #64748b;
      --text-inverse: #ffffff;
      
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-bg: rgba(79, 70, 229, 0.08);
      --primary-glow: rgba(79, 70, 229, 0.15);
      --gradient-primary: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      
      --success: #10b981;
      --success-bg: rgba(16, 185, 129, 0.08);
      --success-border: rgba(16, 185, 129, 0.15);
      --success-text: #047857;
      
      --warning: #f59e0b;
      --warning-bg: rgba(245, 158, 11, 0.08);
      --warning-border: rgba(245, 158, 11, 0.15);
      --warning-text: #b45309;
      
      --danger: #ef4444;
      --danger-bg: rgba(239, 68, 68, 0.08);
      --danger-border: rgba(239, 68, 68, 0.15);
      --danger-text: #b91c1c;
      
      --sh-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --sh-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
      --sh-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      --sh-glow: 0 0 20px rgba(79, 70, 229, 0.1);
    }

    [data-theme="dark"] {
      /* Dark Mode Color Palette (Premium Charcoal & Neon Violet) */
      --bg: #09090b;
      --bg-card: rgba(24, 24, 27, 0.75);
      --bg-card-hover: rgba(32, 32, 35, 0.9);
      --bg-header: rgba(9, 9, 11, 0.8);
      --border: rgba(63, 63, 70, 0.4);
      --border-hover: rgba(82, 82, 91, 0.6);
      --border-focus: #818cf8;
      
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --text-inverse: #09090b;
      
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --primary-bg: rgba(99, 102, 241, 0.15);
      --primary-glow: rgba(99, 102, 241, 0.25);
      --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      
      --success: #34d399;
      --success-bg: rgba(52, 211, 153, 0.1);
      --success-border: rgba(52, 211, 153, 0.2);
      --success-text: #a7f3d0;
      
      --warning: #fbbf24;
      --warning-bg: rgba(251, 191, 36, 0.1);
      --warning-border: rgba(251, 191, 36, 0.2);
      --warning-text: #fde68a;
      
      --danger: #f87171;
      --danger-bg: rgba(248, 113, 113, 0.1);
      --danger-border: rgba(248, 113, 113, 0.2);
      --danger-text: #fecaca;
      
      --sh-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
      --sh-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
      --sh-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
      --sh-glow: 0 0 25px rgba(99, 102, 241, 0.2);
    }

    /* ── Reset & Layout ── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.3s ease, color 0.3s ease;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Custom elegant scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: var(--r-sm);
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* ── Header / Navigation ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-header);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: var(--transition);
    }
    
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .brand-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: var(--gradient-primary);
      border-radius: var(--r-sm);
      color: #fff;
      box-shadow: var(--sh-glow);
    }

    .brand-info h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.01em;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .brand-info p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* Theme Switcher Button */
    .theme-toggle {
      width: 36px;
      height: 36px;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      background: var(--bg-card);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      transition: var(--transition);
    }
    
    .theme-toggle:hover {
      background: var(--bg-card-hover);
      border-color: var(--primary);
      box-shadow: var(--sh-glow);
      transform: translateY(-1px);
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.5s ease;
    }
    
    [data-theme="dark"] .theme-toggle svg {
      transform: rotate(360deg);
    }

    /* ── Main Container ── */
    .container {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      flex-grow: 1;
    }
    
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    
    @media (max-width: 860px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
      header {
        padding: 0 20px;
      }
    }

    /* ── Card Styles ── */
    .card {
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: var(--sh-md);
      transition: var(--transition);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .card:hover {
      box-shadow: var(--sh-lg);
      border-color: var(--border-hover);
    }
    
    .card-head {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .card-step-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--primary-bg);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: var(--transition);
    }
    
    .card-step-num.ok {
      background: var(--success-bg);
      color: var(--success);
    }
    
    .card-head h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      flex-grow: 1;
    }
    
    .card-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex-grow: 1;
    }

    /* ── Dynamic Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      border: 1px solid transparent;
      transition: var(--transition);
    }
    
    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    
    .badge-queued { background: var(--bg); border-color: var(--border); color: var(--text-muted); }
    .badge-busy { background: var(--warning-bg); border-color: var(--warning-border); color: var(--warning-text); }
    .badge-done { background: var(--success-bg); border-color: var(--success-border); color: var(--success-text); }
    .badge-failed { background: var(--danger-bg); border-color: var(--danger-border); color: var(--danger-text); }
    .badge-warn { background: var(--warning-bg); border-color: var(--warning-border); color: var(--warning-text); }
    
    .badge-busy::before {
      animation: pulse-ring 1.5s infinite;
    }
    @keyframes pulse-ring {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }

    /* ── Drag & Drop Area ── */
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: var(--r-md);
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      position: relative;
      background: rgba(0, 0, 0, 0.01);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    
    .dropzone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
      z-index: 2;
    }
    
    .dropzone:hover, .dropzone.over {
      border-color: var(--primary);
      background: var(--primary-bg);
    }
    
    .dropzone:hover .dropzone-icon, .dropzone.over .dropzone-icon {
      transform: translateY(-4px) scale(1.05);
      color: var(--primary);
    }
    
    .dropzone-icon {
      font-size: 32px;
      transition: var(--transition);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .dropzone-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }
    
    .dropzone-hint {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── Dynamic Uploaded File Card ── */
    .file-card {
      display: none;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border-radius: var(--r-md);
      background: var(--bg);
      border: 1px solid var(--border);
      position: relative;
      animation: slide-up 0.25s ease-out;
    }
    
    .file-card.show {
      display: flex;
    }
    
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .file-card-icon {
      width: 42px;
      height: 42px;
      background: var(--primary-bg);
      border-radius: var(--r-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      flex-shrink: 0;
    }
    
    .file-card-info {
      flex-grow: 1;
      min-width: 0;
    }
    
    .file-card-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .file-card-size {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    
    .file-card-remove {
      background: transparent;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: var(--transition);
    }
    
    .file-card-remove:hover {
      background: var(--danger-bg);
      color: var(--danger);
    }

    /* ── Glowing Progress Panel ── */
    .progress-panel {
      display: none;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 16px;
      animation: slide-up 0.25s ease-out;
    }
    
    .progress-panel.show {
      display: block;
    }
    
    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
    }
    
    .progress-label {
      color: var(--text-muted);
      font-weight: 500;
    }
    
    .progress-value {
      font-weight: 700;
      color: var(--primary);
    }
    
    .progress-track {
      height: 6px;
      background: var(--border);
      border-radius: 9999px;
      overflow: hidden;
      position: relative;
    }
    
    .progress-fill {
      height: 100%;
      background: var(--gradient-primary);
      border-radius: 9999px;
      width: 0%;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    
    .progress-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: linear-gradient(
        45deg,
        rgba(255, 255, 255, 0.15) 25%,
        transparent 25%,
        transparent 50%,
        rgba(255, 255, 255, 0.15) 50%,
        rgba(255, 255, 255, 0.15) 75%,
        transparent 75%,
        transparent
      );
      background-size: 16px 16px;
      animation: progress-bar-stripes 1s linear infinite;
    }
    
    @keyframes progress-bar-stripes {
      from { background-position: 0 0; }
      to { background-position: 16px 0; }
    }
    
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    
    .stat-box {
      font-size: 11px;
    }
    
    .stat-label {
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    
    .stat-val {
      font-weight: 600;
      color: var(--text);
    }

    /* ── Configuration & Execution Panel ── */
    .config-panel {
      display: none;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      animation: slide-up 0.3s ease-out;
    }
    
    .config-panel.show {
      display: block;
    }
    
    .config-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .config-row label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }
    
    .custom-select-wrapper {
      position: relative;
      display: inline-block;
      min-width: 140px;
    }
    
    select {
      width: 100%;
      appearance: none;
      outline: none;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 6px 32px 6px 12px;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: var(--transition);
    }
    
    select:hover {
      border-color: var(--primary);
    }
    
    select:focus {
      border-color: var(--primary);
      box-shadow: var(--sh-glow);
    }
    
    .select-arrow {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      display: flex;
    }

    /* ── Buttons ── */
    .btns-group {
      display: flex;
      gap: 12px;
      width: 100%;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: var(--r-md);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      border: none;
    }
    
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }
    
    .btn-primary {
      background: var(--gradient-primary);
      color: var(--text-inverse);
      box-shadow: var(--sh-glow);
    }
    
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.3);
    }
    
    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }
    
    .btn-outline {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
    }
    
    .btn-outline:hover:not(:disabled) {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }

    /* ── Interactive Timeline ── */
    .timeline {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    .timeline::before {
      content: '';
      position: absolute;
      left: 15px;
      top: 12px;
      bottom: 12px;
      width: 2px;
      background: var(--border);
    }
    
    .timeline-item {
      display: flex;
      gap: 14px;
      padding: 10px 0;
      position: relative;
      animation: slide-up 0.25s ease-out;
    }
    
    .timeline-badge {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      z-index: 2;
      flex-shrink: 0;
      font-size: 14px;
      transition: var(--transition);
    }
    
    .timeline-item.running .timeline-badge {
      border-color: var(--primary);
      background: var(--primary-bg);
      color: var(--primary);
      box-shadow: var(--sh-glow);
      animation: badge-pulse 1.5s infinite;
    }
    
    .timeline-item.done .timeline-badge {
      border-color: var(--success);
      background: var(--success-bg);
      color: var(--success);
    }
    
    .timeline-item.failed .timeline-badge {
      border-color: var(--danger);
      background: var(--danger-bg);
      color: var(--danger);
    }
    
    @keyframes badge-pulse {
      0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
      70% { box-shadow: 0 0 0 6px rgba(99, 102, 241, 0); }
      100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
    }
    
    .timeline-content {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 12px 16px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: var(--transition);
    }
    
    .timeline-item.running .timeline-content {
      border-color: var(--primary);
      box-shadow: var(--sh-sm);
    }
    
    .timeline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .timeline-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
    }
    
    .timeline-desc {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
    }
    
    .timeline-err {
      font-size: 11px;
      color: var(--danger);
      margin-top: 4px;
      padding: 6px 10px;
      border-radius: var(--r-sm);
      background: var(--danger-bg);
      border: 1px solid var(--danger-border);
      font-weight: 500;
    }

    /* ── Results Dashboard Grid ── */
    #result-card {
      display: none;
    }
    #result-card.show {
      display: flex;
      animation: slide-up 0.35s ease-out;
    }
    
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    
    .metric-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .metric-val {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    
    .metric-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
    }
    
    .result-summary-box {
      background: var(--success-bg);
      border: 1px solid var(--success-border);
      border-radius: var(--r-md);
      padding: 14px 18px;
      font-size: 12px;
      font-weight: 500;
      color: var(--success-text);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .result-summary-box.warn {
      background: var(--warning-bg);
      border-color: var(--warning-border);
      color: var(--warning-text);
    }

    /* ── Toast Error ── */
    .error-toast {
      display: none;
      align-items: center;
      gap: 10px;
      background: var(--danger-bg);
      border: 1px solid var(--danger-border);
      border-radius: var(--r-md);
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--danger-text);
      margin-top: 10px;
      animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
    }
    
    .error-toast.show {
      display: flex;
    }
    
    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }

    /* ── Custom Loader Animation ── */
    .spin {
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

  <script>
    /* ────────────────────────────────────────────────────────
       1. Helpers & Core Utilities
       ──────────────────────────────────────────────────────── */
    const $ = id => document.getElementById(id);
    const on = (id, ev, fn) => $(id).addEventListener(ev, fn);

    /**
     * Create clean, unified status badges with semantic classes
     */
    function mkBadge(status) {
      const MAP = {
        queued: '排队中', processing: '队列处理中', ingesting: '文档深度解析',
        mapping: '元素映射对齐', patching: '格式自动修补', postprocessing: '微调后处理',
        rendering: '高级渲染预览', repairing: 'AI校正分析',
        done: '处理完成', failed: '执行失败', needs_human: '建议人工微调', missing: '未上传'
      };
      
      let cls = 'badge-busy';
      if (status === 'done') cls = 'badge-done';
      else if (status === 'failed') cls = 'badge-failed';
      else if (status === 'needs_human') cls = 'badge-warn';
      else if (status === 'missing') cls = 'badge-queued';
      
      return `<span class="badge ${cls}">${MAP[status] ?? status}</span>`;
    }

    /**
     * Return beautiful inline SVG elements representing timeline statuses
     */
    function stepIconSvg(type, status) {
      if (status === 'done') {
        return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
      }
      if (status === 'failed') {
        return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
      }
      if (status === 'running') {
        return `<svg class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.78" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>`;
      }
      
      const icons = {
        ingest: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
        mapping: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`,
        patch: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`,
        word_postprocess: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M21 12H3"/><path d="M12 3v18"/></svg>`,
        render: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>`,
        repair_plan: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H9V8"/></svg>`
      };
      
      return icons[type] ?? '•';
    }

    function stepLabel(type) {
      return {
        ingest: '解析文档特征', mapping: '自动映射排版对齐', patch: '格式规则修补',
        word_postprocess: '排版细节微调', render: '渲染预检及PDF生成',
        repair_plan: '自适应修复规划'
      }[type] ?? type;
    }

    /**
     * Resilient API caller with retry backoff & network recovery logic.
     */
    async function api(url, opts = {}, retries = 5, delay = 1000) {
      for (let i = 0; i < retries; i++) {
        try {
          const r = await fetch(url, opts);
          if (!r.ok) {
            const t = await r.text().catch(() => r.statusText);
            throw new Error(`${r.status}: ${t}`);
          }
          return await r.json();
        } catch (e) {
          if (i === retries - 1) throw e;
          // Exponential backoff
          await new Promise(resolve => setTimeout(resolve, delay * Math.pow(1.5, i)));
        }
      }
    }

    function showErr(id, msg) {
      const e = $(id);
      e.querySelector('.err-text').textContent = msg;
      e.classList.add('show');
    }

    function clearErr(id) {
      const e = $(id);
      e.querySelector('.err-text').textContent = '';
      e.classList.remove('show');
    }

    function setBar(pfx, pct, txt) {
      $(`${pfx}-prog-bar`).style.width = pct + '%';
      $(`${pfx}-prog-txt`).textContent = pct + '%';
      $(`${pfx}-prog-status`).textContent = txt;
    }

    function formatBytes(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const dm = 2;
      const sizes = ['Bytes', 'KB', 'MB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    /* ────────────────────────────────────────────────────────
       2. UI States & Core State Store
       ──────────────────────────────────────────────────────── */
    let tplState = { done: false, filename: '', size: 0 };
    let tgtState = { done: false, filename: '', size: 0 };
    
    let tplTimer = null;
    let tgtTimer = null;
    let agentTimer = null;

    function renderFileCard(pfx, isUploaded, filename = '', sizeBytes = 0) {
      const dropEl = $(`${pfx}-drop`);
      const cardEl = $(`${pfx}-file-card`);
      const nameEl = $(`${pfx}-file-name`);
      const sizeEl = $(`${pfx}-file-size`);
      
      if (isUploaded) {
        dropEl.style.display = 'none';
        cardEl.classList.add('show');
        nameEl.textContent = filename;
        sizeEl.textContent = formatBytes(sizeBytes);
      } else {
        dropEl.style.display = 'flex';
        cardEl.classList.remove('show');
        $(`${pfx}-panel`).classList.remove('show');
        $(`${pfx}-num`).classList.remove('ok');
        $(`${pfx}-badge`).innerHTML = mkBadge('missing');
        clearErr(`${pfx}-err`);
      }
    }

    function refreshRunBtn() {
      const btn = $('run-btn');
      btn.disabled = !(tplState.done && tgtState.done);
      if (tplState.done && tgtState.done) {
        btn.classList.add('pulse');
      } else {
        btn.classList.remove('pulse');
      }
    }

    /* ────────────────────────────────────────────────────────
       3. Template Operations & File Parsing
       ──────────────────────────────────────────────────────── */
    on('tpl-file', 'change', e => { if (e.target.files[0]) handleTplUpload(e.target.files[0]); });
    dragDrop('tpl-drop', 'tpl-file', handleTplUpload);
    on('tpl-remove-btn', 'click', () => resetFile('tpl'));

    async function handleTplUpload(file) {
      if (!file.name.endsWith('.docx')) return showErr('tpl-err', '格式不支持，请上传 .docx 类型的标准模板文件');
      clearErr('tpl-err');
      
      tplState.filename = file.name;
      tplState.size = file.size;
      renderFileCard('tpl', true, file.name, file.size);
      
      $('tpl-badge').innerHTML = mkBadge('processing');
      $('tpl-panel').classList.add('show');
      setBar('tpl', 5, '上传标准模板文档中...');
      
      const fd = new FormData();
      fd.append('file', file);
      
      try {
        await api('/templates/current', { method: 'POST', body: fd });
        startTplPolling();
      } catch (e) {
        showErr('tpl-err', `上传失败: ${e.message}`);
        $('tpl-badge').innerHTML = mkBadge('failed');
      }
    }

    function startTplPolling() {
      clearInterval(tplTimer);
      let failedAttempts = 0;
      
      tplTimer = setInterval(async () => {
        try {
          const s = await api('/templates/current/status');
          failedAttempts = 0; // reset
          
          $('tpl-badge').innerHTML = mkBadge(s.status);
          setBar('tpl', s.progress ?? 0, getStatusText(s.status));
          
          if (s.status === 'done') {
            clearInterval(tplTimer);
            tplState.done = true;
            $('tpl-num').classList.add('ok');
            loadTplStats();
            refreshRunBtn();
          } else if (s.status === 'failed') {
            clearInterval(tplTimer);
            showErr('tpl-err', s.error_message ?? '标准模板排版特征提取失败');
          }
        } catch (err) {
          failedAttempts++;
          if (failedAttempts >= 5) {
            clearInterval(tplTimer);
            showErr('tpl-err', '与服务器连接抖动剧烈，排版解析已挂起，请刷新重试');
            $('tpl-badge').innerHTML = mkBadge('failed');
          } else {
            $('tpl-badge').innerHTML = `<span class="badge badge-warn">重新连接中...</span>`;
          }
        }
      }, 1500);
    }

    function getStatusText(status) {
      const map = {
        processing: '队列分析中',
        ingesting: '深度识别提取排版原子',
        done: '模板规范提取完毕'
      };
      return map[status] ?? '标准文档格式提取中';
    }

    async function loadTplStats() {
      try {
        const [r, a] = await Promise.all([
          api('/templates/current/rules?limit=1'),
          api('/templates/current/atoms?limit=1'),
        ]);
        $('tpl-rules').textContent = (r.total ?? 0) + ' 条规则';
        $('tpl-atoms').textContent = (a.total ?? 0) + ' 个原子';
      } catch {}
    }

    /* ────────────────────────────────────────────────────────
       4. Target Operations & Feature Detection
       ──────────────────────────────────────────────────────── */
    on('tgt-file', 'change', e => { if (e.target.files[0]) handleTgtUpload(e.target.files[0]); });
    dragDrop('tgt-drop', 'tgt-file', handleTgtUpload);
    on('tgt-remove-btn', 'click', () => resetFile('tgt'));

    async function handleTgtUpload(file) {
      if (!file.name.endsWith('.docx')) return showErr('tgt-err', '格式不支持，请上传 .docx 类型的目标文档');
      clearErr('tgt-err');
      
      tgtState.filename = file.name;
      tgtState.size = file.size;
      renderFileCard('tgt', true, file.name, file.size);
      
      tgtState.done = false;
      $('tgt-badge').innerHTML = mkBadge('processing');
      $('tgt-panel').classList.add('show');
      setBar('tgt', 5, '上传待校正文档中...');
      
      $('agent-wrap').classList.remove('show');
      hideResult();
      $('steps').innerHTML = '';
      
      const fd = new FormData();
      fd.append('file', file);
      
      try {
        await api('/targets', { method: 'POST', body: fd });
        startTgtPolling();
      } catch (e) {
        showErr('tgt-err', `上传失败: ${e.message}`);
        $('tgt-badge').innerHTML = mkBadge('failed');
      }
    }

    function startTgtPolling() {
      clearInterval(tgtTimer);
      let failedAttempts = 0;
      
      tgtTimer = setInterval(async () => {
        try {
          const s = await api('/targets/latest/status');
          failedAttempts = 0;
          
          $('tgt-badge').innerHTML = mkBadge(s.status);
          setBar('tgt', s.progress ?? 0, getTargetStatusText(s.status));
          
          if (s.status === 'done') {
            clearInterval(tgtTimer);
            tgtState.done = true;
            $('tgt-num').classList.add('ok');
            loadTgtStats();
            
            $('agent-wrap').classList.add('show');
            refreshRunBtn();
          } else if (s.status === 'failed') {
            clearInterval(tgtTimer);
            showErr('tgt-err', s.error_message ?? '目标文档解析对齐报错');
          }
        } catch (err) {
          failedAttempts++;
          if (failedAttempts >= 5) {
            clearInterval(tgtTimer);
            showErr('tgt-err', '与服务器连接超时，自动任务解析已停止');
            $('tgt-badge').innerHTML = mkBadge('failed');
          } else {
            $('tgt-badge').innerHTML = `<span class="badge badge-warn">重新连接中...</span>`;
          }
        }
      }, 1500);
    }

    function getTargetStatusText(status) {
      const map = {
        processing: '排队调度中',
        ingesting: '识别全量排版元素',
        mapping: '与模板格式节点做指纹对齐',
        done: '目标文档准备就绪'
      };
      return map[status] ?? '排版对齐检测中';
    }

    async function loadTgtStats() {
      try {
        const [el, mp] = await Promise.all([
          api('/targets/latest/elements?limit=1'),
          api('/targets/latest/mappings?limit=1'),
        ]);
        $('tgt-elems').textContent = (el.total ?? 0) + ' 个节点';
        $('tgt-mappings').textContent = (mp.total ?? 0) + ' 处映射对齐';
      } catch {}
    }

    /* ────────────────────────────────────────────────────────
       5. Reset Mechanism
       ──────────────────────────────────────────────────────── */
    function resetFile(pfx) {
      if (pfx === 'tpl') {
        clearInterval(tplTimer);
        tplState = { done: false, filename: '', size: 0 };
        renderFileCard('tpl', false);
      } else {
        clearInterval(tgtTimer);
        clearInterval(agentTimer);
        tgtState = { done: false, filename: '', size: 0 };
        renderFileCard('tgt', false);
        $('agent-wrap').classList.remove('show');
        hideResult();
        $('steps').innerHTML = '';
      }
      refreshRunBtn();
    }

    /* ────────────────────────────────────────────────────────
       6. AI Agent Executions Runway
       ──────────────────────────────────────────────────────── */
    on('run-btn', 'click', async () => {
      $('run-btn').disabled = true;
      $('steps').innerHTML = '';
      hideResult();
      clearErr('tgt-err');
      
      try {
        await api(`/targets/latest/agent-run?max_rounds=${$('rounds').value}`, { method: 'POST' });
        startAgentPolling();
      } catch (e) {
        showErr('tgt-err', `校正任务提交报错: ${e.message}`);
        $('run-btn').disabled = false;
      }
    });

    function startAgentPolling() {
      clearInterval(agentTimer);
      let failedAttempts = 0;
      
      agentTimer = setInterval(async () => {
        try {
          const run = await api('/targets/latest/agent-run/status');
          failedAttempts = 0;
          
          renderSteps(run.steps ?? []);
          
          if (['done', 'failed', 'needs_human'].includes(run.status)) {
            clearInterval(agentTimer);
            showResult(run);
            $('run-btn').disabled = false;
          }
        } catch (err) {
          failedAttempts++;
          if (failedAttempts >= 5) {
            clearInterval(agentTimer);
            showErr('tgt-err', '校正状态流断开，任务进度已脱机');
            $('run-btn').disabled = false;
          }
        }
      }, 2000);
    }

    function renderSteps(steps) {
      // De-duplicate keeping the most up-to-date state per (round, type)
      const seen = new Map();
      for (const s of steps) {
        seen.set(`${s.round_number}:${s.step_type}`, s);
      }
      
      const list = $('steps');
      list.innerHTML = '';
      
      for (const [, s] of seen) {
        const detailText = fmtDetail(s.summary);
        
        const item = document.createElement('div');
        item.className = `timeline-item ${s.status}`;
        
        item.innerHTML = `
          <div class="timeline-badge">
            ${stepIconSvg(s.step_type, s.status)}
          </div>
          <div class="timeline-content">
            <div class="timeline-header">
              <span class="timeline-title">第 ${s.round_number} 轮 · ${stepLabel(s.step_type)}</span>
            </div>
            ${detailText ? `<div class="timeline-desc">${detailText}</div>` : ''}
            ${s.error_message ? `<div class="timeline-err">${s.error_message}</div>` : ''}
          </div>
        `;
        
        list.appendChild(item);
      }
    }

    function fmtDetail(m) {
      if (!m) return '';
      if (m.applied != null) return `已自动应用 ${m.applied} 项格式微调，跳过 ${m.skipped} 处冗余。`;
      if (m.mappingCount != null) return `指纹计算对齐：检测到 ${m.mappingCount} 组关系结构。`;
      if (m.pageCount != null) return `排版渲染校验：文档当前输出页数：${m.pageCount} 页。`;
      if (m.targetElementCount != null) return `特征工程解析：完成目标树节点识别，共 ${m.targetElementCount} 个元素。`;
      if (m.operationCount != null) return `修复引擎生成：决策树匹配出排版重置任务 ${m.operationCount} 组。`;
      if (m.status === 'done') return '本阶段成功完成。';
      return '';
    }

    /* ────────────────────────────────────────────────────────
       7. Result Analysis Report Dashboard
       ──────────────────────────────────────────────────────── */
    function showResult(run) {
      const s = run.summary ?? {};
      
      $('metric-rounds').textContent = s.rounds != null ? `${s.rounds} 轮` : '—';
      $('metric-out-pages').textContent = s.outputPageCount != null ? `${s.outputPageCount} 页` : '—';
      $('metric-base-pages').textContent = s.baselinePageCount != null ? `${s.baselinePageCount} 页` : '—';
      
      const stopReasonMap = {
        all_operations_applied: '规则完全应用 ✓',
        render_precheck_passed: '渲染预检通过',
        render_precheck_unavailable: '渲染预检不可用',
        page_count_unavailable: '页数读取不可用',
        max_rounds_reached: '达最大修复上限',
        layout_drift_too_large: '布局漂移过大',
        no_repairable_operations: '无可校正操作',
        loop_exhausted: '校正循环耗尽'
      };
      $('metric-reason').textContent = stopReasonMap[s.stopReason] ?? s.stopReason ?? '校正完成';
      
      const sumBox = $('result-summary-box');
      const sumTxt = $('result-summary-text');
      
      if (run.status === 'needs_human') {
        sumBox.className = 'result-summary-box warn';
        const renderGateReason = s.renderGateReason ?? s.stopReason;
        if (renderGateReason === 'render_precheck_unavailable') {
          sumTxt.textContent = '已完成格式校正，但当前环境未完成渲染预检。请确认 LibreOffice 可用后复核输出。';
        } else if (renderGateReason === 'page_count_unavailable') {
          sumTxt.textContent = '已完成格式校正，但未能读取渲染页数。建议下载 DOCX/PDF 后人工核对版面。';
        } else if (s.stopReason === 'no_repairable_operations') {
          sumTxt.textContent = `完成校正。仍有 ${s.skippedOperations ?? '少量'} 项需人工复核，建议下载 PDF 检查最终版面。`;
        } else {
          sumTxt.textContent = '完成校正。部分微调对版面排版页数影响略大，推荐下载 PDF 深度人工校验。';
        }
      } else {
        sumBox.className = 'result-summary-box';
        sumTxt.textContent = '成功完成全套格式自动校正。所有结构规则已被精准灌入。';
      }
      
      $('result-badge').innerHTML = mkBadge(run.status);
      $('result-card').classList.add('show');
      
      $('dl-docx').style.display = 'inline-flex';
      
      // Determine if a PDF was successfully rendered during pipeline
      const hasPdf = (run.steps ?? []).some(st => st.step_type === 'render' && st.status === 'done');
      if (hasPdf) {
        $('dl-pdf').style.display = 'inline-flex';
      }
      
      // Scroll result smoothly into viewport
      $('result-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function hideResult() {
      $('result-card').classList.remove('show');
      $('dl-docx').style.display = 'none';
      $('dl-pdf').style.display = 'none';
    }

    /* ────────────────────────────────────────────────────────
       8. Drag & Drop Helper
       ──────────────────────────────────────────────────────── */
    function dragDrop(zoneId, inputId, cb) {
      const z = $(zoneId);
      z.addEventListener('dragover', e => { e.preventDefault(); z.classList.add('over'); });
      z.addEventListener('dragleave', () => z.classList.remove('over'));
      z.addEventListener('drop', e => {
        e.preventDefault();
        z.classList.remove('over');
        const f = e.dataTransfer.files[0];
        if (f) cb(f);
      });
    }

    /* ────────────────────────────────────────────────────────
       9. Deeply Integrated Theme Switcher
       ──────────────────────────────────────────────────────── */
    const themeBtn = $('theme-toggle');
    const moonPath = themeBtn.querySelector('.moon-path');
    const sunCircle = themeBtn.querySelector('.sun-circle');
    const sunLines = themeBtn.querySelectorAll('.sun-line');

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      
      if (theme === 'dark') {
        moonPath.style.display = 'block';
        sunCircle.style.display = 'none';
        sunLines.forEach(l => l.style.display = 'none');
      } else {
        moonPath.style.display = 'none';
        sunCircle.style.display = 'block';
        sunLines.forEach(l => l.style.display = 'block');
      }
    }

    on('theme-toggle', 'click', () => {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      applyTheme(next);
    });

    // Detect system preferred theme
    const savedTheme = localStorage.getItem('theme');
    const sysPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(savedTheme ?? (sysPrefersDark ? 'dark' : 'light'));

    /* ────────────────────────────────────────────────────────
       10. App Initialization & Active State Syncing
       ──────────────────────────────────────────────────────── */
    (async () => {
      // Sync Template Document status
      try {
        const s = await api('/templates/current/status', {}, 3, 500);
        if (s.status && s.status !== 'missing') {
          tplState.filename = '已缓存模板.docx';
          tplState.size = 0; // Server-cached state
          renderFileCard('tpl', true, tplState.filename, tplState.size);
          $('tpl-badge').innerHTML = mkBadge(s.status);
          $('tpl-panel').classList.add('show');
          setBar('tpl', s.progress ?? 0, getStatusText(s.status));
          
          if (s.status === 'done') {
            tplState.done = true;
            $('tpl-num').classList.add('ok');
            await loadTplStats();
          } else if (!['failed'].includes(s.status)) {
            startTplPolling();
          }
        }
      } catch {}

      // Sync Target Document status
      try {
        const s = await api('/targets/latest/status', {}, 3, 500);
        if (s.status && s.status !== 'missing') {
          tgtState.filename = '已缓存目标文档.docx';
          tgtState.size = 0;
          renderFileCard('tgt', true, tgtState.filename, tgtState.size);
          $('tgt-badge').innerHTML = mkBadge(s.status);
          $('tgt-panel').classList.add('show');
          setBar('tgt', s.progress ?? 0, getTargetStatusText(s.status));
          
          if (s.status === 'done') {
            tgtState.done = true;
            $('tgt-num').classList.add('ok');
            await loadTgtStats();
            $('agent-wrap').classList.add('show');
          } else if (!['failed'].includes(s.status)) {
            startTgtPolling();
          }
        }
      } catch {}

      refreshRunBtn();

      // Sync active Agent pipeline status
      try {
        const run = await api('/targets/latest/agent-run/status', {}, 3, 500);
        if (run?.status) {
          renderSteps(run.steps ?? []);
          if (['done', 'failed', 'needs_human'].includes(run.status)) {
            showResult(run);
          } else {
            startAgentPolling();
          }
        }
      } catch {}
    })();
  </script>
</body>
</html>
