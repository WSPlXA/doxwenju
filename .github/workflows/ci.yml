name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: doxwenju
          POSTGRES_USER: doxwenju
          POSTGRES_PASSWORD: doxwenju
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U doxwenju -d doxwenju"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+psycopg://doxwenju:doxwenju@localhost:15432/doxwenju
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      GEMINI_RERANK_ENABLED: "false"
      AGENT_RUN_INLINE: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Migrate database
        run: alembic upgrade head

      - name: Test
        run: python -m pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -t doxwenju-api-ci .
